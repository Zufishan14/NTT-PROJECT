<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://cdn.tailwindcss.com"></script>
        <title>NTT - Register</title>
    </head>

    <body class="bg-gray-100">
        <div class="min-h-screen flex flex-col items-center justify-center">
            <div class="max-w-md w-full space-y-8 p-8 bg-white rounded-lg shadow-md">
                <div class="text-center">
                    <h1 class="text-3xl font-bold text-gray-900 mb-2">Register</h1>
                    <p class="text-gray-600">Create your account</p>
                </div>

                <form method="post" class="mt-8 space-y-6">
                    {% csrf_token %}
                    {% if form.errors %}
                        <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded">
                            Please correct the errors below.
                            {{ form.errors }}
                        </div>
                    {% endif %}

                    {% if messages %}
                        {% for message in messages %}
                            <div class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded">
                                {{ message }}
                            </div>
                        {% endfor %}
                    {% endif %}

                    <div class="rounded-md shadow-sm -space-y-px">
                        <div>
                            <label for="id_username" class="sr-only">Username</label>
                            <input id="id_username" name="username" type="text" required 
                                   class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-t-md focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm" 
                                   placeholder="Username">
                        </div>
                        <div>
                            <label for="id_password1" class="sr-only">Password</label>
                            <input id="id_password1" name="password1" type="password" required 
                                   class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm" 
                                   placeholder="Password">
                        </div>
                        <div>
                            <label for="id_password2" class="sr-only">Confirm Password</label>
                            <input id="id_password2" name="password2" type="password" required 
                                   class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-b-md focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm" 
                                   placeholder="Confirm Password">
                        </div>
                    </div>

                    <div class="space-y-4">
                        <div class="flex items-center">
                            <input id="id_can_view" name="can_view" type="checkbox" 
                                   class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                            <label for="id_can_view" class="ml-2 block text-sm text-gray-900">
                                Can view all bookings
                            </label>
                        </div>
                        <div class="flex items-center">
                            <input id="id_can_upload" name="can_upload" type="checkbox" 
                                   class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                            <label for="id_can_upload" class="ml-2 block text-sm text-gray-900">
                                Can create bookings
                            </label>
                        </div>
                    </div>

                    <div>
                        <button type="submit" 
                                class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                            Register
                        </button>
                    </div>
                </form>

                <div class="text-center">
                    <p class="text-sm text-gray-600">
                        Already have an account? 
                        <a href="{% url 'core:login' %}" class="font-medium text-blue-600 hover:text-blue-500">
                            Login here
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </body>
</html>
