<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://cdn.tailwindcss.com"></script>
        <title>NTT - Booking Management</title>
    </head>

    <body class="bg-gray-100">
        <div class="min-h-screen flex flex-col items-center justify-center">
            <div class="max-w-md w-full space-y-8 p-8 bg-white rounded-lg shadow-md">
                <div class="text-center">
                    <h1 class="text-3xl font-bold text-gray-900 mb-2">Welcome to NTT Booking Portal</h1>
                    <p class="text-gray-600">Manage your bookings efficiently</p>
                </div>
                <div class="space-y-4">
                    <a href="{% url 'core:login' %}" 
                       class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                        Login
                    </a>
                    <a href="{% url 'core:register' %}" 
                       class="w-full flex justify-center py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                        Register
                    </a>
                </div>
            </div>
        </div>
    </body>
</html>
