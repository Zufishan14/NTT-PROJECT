<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://cdn.tailwindcss.com"></script>
        <title>NTT - Create Booking</title>
    </head>

    <body class="bg-gray-100">
        <nav class="bg-white shadow">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16">
                    <div class="flex">
                        <div class="flex-shrink-0 flex items-center">
                            <h1 class="text-xl font-bold text-gray-900">NTT Portal</h1>
                        </div>
                    </div>
                    <div class="flex items-center">
                        <a href="{% url 'core:home' %}" 
                           class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700">
                            Back to Home
                        </a>
                    </div>
                </div>
            </div>
        </nav>

        <div class="min-h-screen flex flex-col items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
            <div class="max-w-md w-full space-y-8">
                <div>
                    <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">
                        Create New Booking
                    </h2>
                </div>
                <form class="mt-8 space-y-6" method="POST">
                    {% csrf_token %}
                    {% if form.errors %}
                        <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative">
                            {{ form.errors }}
                        </div>
                    {% endif %}
                    {% if messages %}
                        {% for message in messages %}
                            <div class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded relative">
                                {{ message }}
                            </div>
                        {% endfor %}
                    {% endif %}
                    <div class="space-y-4">
                        <div>
                            <label for="id_date" class="block text-sm font-medium text-gray-700">Date</label>
                            <input type="date" name="date" id="id_date" required
                                   class="mt-1 block w-full py-2 px-3 border border-gray-300 bg-white rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                        </div>
                        <div>
                            <label for="id_time_slot" class="block text-sm font-medium text-gray-700">Time Slot</label>
                            <input type="text" name="time_slot" id="id_time_slot" required
                                   class="mt-1 block w-full py-2 px-3 border border-gray-300 bg-white rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
                                   placeholder="e.g., 9:00 AM - 10:00 AM">
                        </div>
                    </div>

                    <div>
                        <button type="submit"
                                class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                            Create Booking
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </body>
</html>
